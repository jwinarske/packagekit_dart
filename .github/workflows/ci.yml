name: CI

on:
  push:    { branches: [main, develop] }
  pull_request: { branches: [main] }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format check ──────────────────────────────────────────────────────────
  format:
    name: Format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - run: sudo apt-get update -qq && sudo apt-get install -y clang-format-19
      - run: ./scripts/clang_format.sh check
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - name: Dart format check
        run: |
          dirs=""
          [ -d lib ] && dirs="$dirs lib/"
          [ -d test ] && dirs="$dirs test/"
          if [ -n "$dirs" ]; then
            dart format --set-exit-if-changed $dirs
          else
            echo "No Dart directories to format."
          fi

  # ── Ubuntu 24.04 x86_64 ──────────────────────────────────────────────────
  build-ubuntu-x64:
    name: Ubuntu 24.04 / x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            clang-19 \
            libsystemd-dev \
            libgtest-dev
      - name: Build (Release)
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
      - name: C++ unit tests
        run: ctest --test-dir build/test --output-on-failure -j4

  # ── ASAN + UBSan ─────────────────────────────────────────────────────────
  asan:
    name: ASAN + UBSan (Ubuntu x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang-19 \
            libsystemd-dev libgtest-dev
      - run: ./scripts/asan.sh build-asan
