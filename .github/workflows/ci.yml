name: CI

on:
  push:    { branches: [main, develop] }
  pull_request: { branches: [main] }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format check ──────────────────────────────────────────────────────────
  format:
    name: Format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - run: sudo apt-get update -qq && sudo apt-get install -y clang-format-19
      - run: ./scripts/clang_format.sh check
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: dart pub get
      - name: Dart format check
        run: |
          dirs=""
          [ -d lib ] && dirs="$dirs lib/"
          [ -d test ] && dirs="$dirs test/"
          [ -d hook ] && dirs="$dirs hook/"
          if [ -n "$dirs" ]; then
            dart format --set-exit-if-changed $dirs
          else
            echo "No Dart directories to format."
          fi

  # ── Ubuntu 24.04 x86_64 ──────────────────────────────────────────────────
  build-ubuntu-x64:
    name: Ubuntu 24.04 / x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config \
            clang-19 \
            libsystemd-dev \
            libgtest-dev
      - name: Build (Release)
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
      - name: C++ unit tests
        run: ctest --test-dir build/test --output-on-failure -j4
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: dart pub get
      - name: Dart tests
        env:
          PK_NC_LIB: ${{ github.workspace }}/build/libpackagekit_nc.so
        run: dart test --reporter=expanded

  # ── Ubuntu 24.04 arm64 ───────────────────────────────────────────────────
  build-ubuntu-arm64:
    name: Ubuntu 24.04 / arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config clang-19 \
            libsystemd-dev libgtest-dev
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: dart pub get
      - name: Build + test
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
          ctest --test-dir build/test --output-on-failure -j4
      - name: Dart tests
        env:
          PK_NC_LIB: ${{ github.workspace }}/build/libpackagekit_nc.so
        run: dart test

  # ── Fedora 41 x86_64 (container) ─────────────────────────────────────────
  build-fedora-x64:
    name: Fedora 41 / x86_64
    runs-on: ubuntu-24.04
    container: { image: fedora:41 }
    steps:
      - name: Install deps
        run: |
          dnf install -y \
            git cmake ninja-build \
            clang clang-tools-extra \
            systemd-devel \
            gtest-devel lcov unzip curl
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - name: Install Dart SDK
        run: |
          curl -fsSL \
            "https://storage.googleapis.com/dart-archive/channels/stable/release/latest/sdk/dartsdk-linux-x64-release.zip" \
            -o dart-sdk.zip
          unzip -q dart-sdk.zip
          echo "$PWD/dart-sdk/bin" >> "$GITHUB_PATH"
      - run: dart pub get
      - name: Build + test
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
          ctest --test-dir build/test --output-on-failure -j4
      - name: Dart tests
        env:
          PK_NC_LIB: ${{ github.workspace }}/build/libpackagekit_nc.so
        run: dart test

  # ── Fedora 41 arm64 (container on arm runner) ─────────────────────────────
  build-fedora-arm64:
    name: Fedora 41 / arm64
    runs-on: ubuntu-24.04-arm
    container: { image: fedora:41 }
    steps:
      - name: Install deps
        run: |
          dnf install -y \
            git cmake ninja-build \
            clang clang-tools-extra \
            systemd-devel \
            gtest-devel unzip curl
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - name: Install Dart SDK (arm64)
        run: |
          curl -fsSL \
            "https://storage.googleapis.com/dart-archive/channels/stable/release/latest/sdk/dartsdk-linux-arm64-release.zip" \
            -o dart-sdk.zip
          unzip -q dart-sdk.zip
          echo "$PWD/dart-sdk/bin" >> "$GITHUB_PATH"
      - run: dart pub get
      - name: Build + test
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
          ctest --test-dir build/test --output-on-failure -j4
      - name: Dart tests
        env:
          PK_NC_LIB: ${{ github.workspace }}/build/libpackagekit_nc.so
        run: dart test

  # ── ASAN + UBSan ─────────────────────────────────────────────────────────
  asan:
    name: ASAN + UBSan (Ubuntu x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config clang-19 \
            libclang-rt-19-dev \
            libsystemd-dev libgtest-dev
      - run: ./scripts/asan.sh build-asan

  # ── clang-tidy ───────────────────────────────────────────────────────────
  clang-tidy:
    name: clang-tidy (Ubuntu x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config \
            clang-19 clang-tidy-19 \
            libsystemd-dev
      - name: Build (for compile_commands.json)
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19
          cmake --build build --parallel
      - run: ./scripts/clang_tidy.sh build

  # ── Publish dry-run ───────────────────────────────────────────────────────
  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: dart pub get
      - run: dart pub publish --dry-run
      - run: dart analyze
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - name: Flutter example analyze
        working-directory: example/packagekit_catalog
        run: |
          flutter pub get
          flutter analyze

  # ── Coverage ─────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    needs: [build-ubuntu-x64]
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config gcc g++ \
            libsystemd-dev libgtest-dev lcov
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: dart pub global activate coverage && dart pub get
      - name: Build with coverage
        run: |
          cmake -B build-cov native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_COVERAGE=ON \
            -DBUILD_TESTING=ON
          cmake --build build-cov --parallel
      - name: C++ tests + lcov
        run: |
          ctest --test-dir build-cov/test --output-on-failure -j4
          lcov --capture --directory build-cov \
            --output-file build-cov/coverage.info \
            --ignore-errors mismatch,empty
          lcov --remove build-cov/coverage.info \
            '*/third_party/*' '*/test/*' '/usr/*' \
            --output-file build-cov/coverage.info \
            --ignore-errors empty
      - name: Dart tests with coverage
        env:
          PK_NC_LIB: ${{ github.workspace }}/build-cov/libpackagekit_nc.so
        run: |
          dart test --coverage=coverage
          dart pub global run coverage:format_coverage \
            --lcov --in=coverage --out=coverage/lcov.info \
            --report-on=lib
      - name: Remove generated files from coverage
        run: |
          python3 << 'EOF'
          import re
          with open('coverage/lcov.info') as f:
              content = f.read()
          blocks = re.split(r'(?=^SF:)', content, flags=re.MULTILINE)
          filtered = []
          for block in blocks:
              if not block.startswith('SF:'):
                  filtered.append(block)
                  continue
              filename = block.split('\n')[0][3:]
              if '.g.dart' in filename or '.freezed.dart' in filename:
                  continue
              filtered.append(block)
          with open('coverage/lcov.info', 'w') as f:
              f.write(''.join(filtered))
          EOF
      - name: Enforce coverage threshold (10%)
        run: |
          pct=$(awk -F'[:,]' '/^DA:/{total++; if ($3 > 0) hit++} END { if (total == 0) { print 0 } else { printf "%.2f", (hit/total)*100 } }' coverage/lcov.info)
          echo "Coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { exit (p >= 10) ? 0 : 1 }'
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: build-cov/coverage.info,coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
