name: CI

on:
  push:    { branches: [main, develop] }
  pull_request: { branches: [main] }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format check ──────────────────────────────────────────────────────────
  format:
    name: Format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - run: sudo apt-get update -qq && sudo apt-get install -y clang-format-19
      - run: ./scripts/clang_format.sh check
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - name: Dart format check
        run: |
          dirs=""
          [ -d lib ] && dirs="$dirs lib/"
          [ -d test ] && dirs="$dirs test/"
          if [ -n "$dirs" ]; then
            dart format --set-exit-if-changed $dirs
          else
            echo "No Dart directories to format."
          fi

  # ── Ubuntu 24.04 x86_64 ──────────────────────────────────────────────────
  build-ubuntu-x64:
    name: Ubuntu 24.04 / x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config \
            clang-19 \
            libsystemd-dev \
            libgtest-dev
      - name: Build (Release)
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
      - name: C++ unit tests
        run: ctest --test-dir build/test --output-on-failure -j4
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: dart pub get
      - name: Dart tests
        env:
          PK_NC_LIB: ${{ github.workspace }}/build/libpackagekit_nc.so
        run: dart test --reporter=expanded

  # ── Ubuntu 24.04 arm64 ───────────────────────────────────────────────────
  build-ubuntu-arm64:
    name: Ubuntu 24.04 / arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config clang-19 \
            libsystemd-dev libgtest-dev
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: dart pub get
      - name: Build + test
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
          ctest --test-dir build/test --output-on-failure -j4
      - name: Dart tests
        env:
          PK_NC_LIB: ${{ github.workspace }}/build/libpackagekit_nc.so
        run: dart test

  # ── Fedora 41 x86_64 (container) ─────────────────────────────────────────
  build-fedora-x64:
    name: Fedora 41 / x86_64
    runs-on: ubuntu-24.04
    container: { image: fedora:41 }
    steps:
      - name: Install deps
        run: |
          dnf install -y \
            git cmake ninja-build \
            clang clang-tools-extra \
            systemd-devel \
            gtest-devel lcov unzip curl
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - name: Install Dart SDK
        run: |
          curl -fsSL \
            "https://storage.googleapis.com/dart-archive/channels/stable/release/latest/sdk/dartsdk-linux-x64-release.zip" \
            -o dart-sdk.zip
          unzip -q dart-sdk.zip
          echo "$PWD/dart-sdk/bin" >> "$GITHUB_PATH"
      - run: dart pub get
      - name: Build + test
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
          ctest --test-dir build/test --output-on-failure -j4
      - name: Dart tests
        env:
          PK_NC_LIB: ${{ github.workspace }}/build/libpackagekit_nc.so
        run: dart test

  # ── Fedora 41 arm64 (container on arm runner) ─────────────────────────────
  build-fedora-arm64:
    name: Fedora 41 / arm64
    runs-on: ubuntu-24.04-arm
    container: { image: fedora:41 }
    steps:
      - name: Install deps
        run: |
          dnf install -y \
            git cmake ninja-build \
            clang clang-tools-extra \
            systemd-devel \
            gtest-devel unzip curl
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - name: Install Dart SDK (arm64)
        run: |
          curl -fsSL \
            "https://storage.googleapis.com/dart-archive/channels/stable/release/latest/sdk/dartsdk-linux-arm64-release.zip" \
            -o dart-sdk.zip
          unzip -q dart-sdk.zip
          echo "$PWD/dart-sdk/bin" >> "$GITHUB_PATH"
      - run: dart pub get
      - name: Build + test
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
          ctest --test-dir build/test --output-on-failure -j4
      - name: Dart tests
        env:
          PK_NC_LIB: ${{ github.workspace }}/build/libpackagekit_nc.so
        run: dart test

  # ── ASAN + UBSan ─────────────────────────────────────────────────────────
  asan:
    name: ASAN + UBSan (Ubuntu x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config clang-19 \
            libsystemd-dev libgtest-dev
      - run: ./scripts/asan.sh build-asan

  # ── clang-tidy ───────────────────────────────────────────────────────────
  clang-tidy:
    name: clang-tidy (Ubuntu x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config \
            clang-19 clang-tidy-19 \
            libsystemd-dev
      - name: Build (for compile_commands.json)
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19
          cmake --build build --parallel
      - run: ./scripts/clang_tidy.sh build

  # ── Coverage (PR only) ───────────────────────────────────────────────────
  coverage:
    name: Coverage (PR)
    runs-on: ubuntu-24.04
    needs: [build-ubuntu-x64]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config gcc g++ \
            libsystemd-dev libgtest-dev lcov
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: dart pub global activate coverage && dart pub get
      - name: Build with coverage
        run: |
          cmake -B build-cov native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_COVERAGE=ON \
            -DBUILD_TESTING=ON
          cmake --build build-cov --parallel
      - name: C++ tests + lcov
        run: |
          ctest --test-dir build-cov/test --output-on-failure -j4
          lcov --capture --directory build-cov \
            --output-file build-cov/coverage.info \
            --ignore-errors mismatch,empty
          lcov --remove build-cov/coverage.info \
            '*/third_party/*' '*/test/*' '/usr/*' \
            --output-file build-cov/coverage.info \
            --ignore-errors empty
